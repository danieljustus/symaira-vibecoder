<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>symvibe · Baukasten</title>
<style>
  :root {
    --bg: #0f1115; --panel: #161a21; --panel-2: #1c222b; --line: #272e39;
    --txt: #d7dce3; --muted: #8b94a3; --faint: #5b6473;
    --accent: #6aa0ff; --accent-dim: #2c3a55;
    --ok: #5bbf8a; --warn: #e0b15a; --bad: #e0726b; --run: #6aa0ff;
    --radius: 10px; --shadow: 0 1px 0 rgba(255,255,255,.02), 0 6px 18px rgba(0,0,0,.25);
    font-synthesis: none;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg:#f5f6f8; --panel:#fff; --panel-2:#f0f2f5; --line:#e3e6ea;
      --txt:#1d2530; --muted:#5e6675; --faint:#9aa2b1; --accent-dim:#dbe6ff;
    }
  }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; }
  body {
    background: var(--bg); color: var(--txt); font: 14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header {
    display:flex; align-items:center; gap:14px; padding:10px 16px; border-bottom:1px solid var(--line);
    background:var(--panel); flex:0 0 auto;
  }
  .brand { font-weight:650; letter-spacing:.2px; }
  .brand b { color:var(--accent); }
  .brand small { color:var(--faint); font-weight:400; margin-left:6px; }
  .spacer { flex:1; }
  .doctor { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--faint); }
  .dot.ok { background:var(--ok); } .dot.bad { background:var(--bad); }
  .toolbar { display:flex; gap:6px; flex-wrap:wrap; }
  button {
    font:inherit; color:var(--txt); background:var(--panel-2); border:1px solid var(--line);
    border-radius:8px; padding:6px 11px; cursor:pointer; transition:.12s;
  }
  button:hover:not(:disabled) { border-color:var(--accent); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  button.primary { background:var(--accent); border-color:var(--accent); color:#08111f; font-weight:600; }
  button.ghost { background:transparent; }
  button.tiny { padding:2px 7px; font-size:12px; }
  main { display:flex; flex:1; min-height:0; }
  .board { flex:1; overflow:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }
  .phase {
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
  }
  .phase > .phase-head {
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-bottom:1px solid var(--line);
  }
  .phase-head .pname { font-weight:600; }
  .phase-head .pno { color:var(--faint); font-variant-numeric:tabular-nums; font-size:12px; min-width:18px; }
  .steps { padding:8px; display:flex; flex-direction:column; gap:7px; min-height:14px; }
  .steps.dragover { outline:2px dashed var(--accent-dim); outline-offset:-4px; border-radius:8px; }
  .card {
    display:flex; align-items:center; gap:10px; padding:8px 10px; background:var(--panel-2);
    border:1px solid var(--line); border-radius:9px; cursor:grab;
  }
  .card.disabled { opacity:.5; }
  .card.active { border-color:var(--run); box-shadow:0 0 0 1px var(--run) inset; }
  .card:active { cursor:grabbing; }
  .glyph { width:20px; text-align:center; font-size:15px; flex:0 0 auto; }
  .glyph.pending { color:var(--faint); }
  .glyph.in_progress { color:var(--run); animation:spin 1.1s linear infinite; }
  .glyph.done { color:var(--ok); } .glyph.skipped { color:var(--faint); }
  .glyph.failed { color:var(--bad); } .glyph.blocked { color:var(--warn); }
  .glyph.needs_review { color:var(--warn); }
  @keyframes spin { to { transform:rotate(360deg); } }
  .card .meta { flex:1; min-width:0; }
  .card .title { display:flex; align-items:center; gap:8px; }
  .card .sid { color:var(--faint); font-size:11px; font-variant-numeric:tabular-nums; }
  .card .name { font-weight:550; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card .binds { display:flex; gap:6px; margin-top:3px; flex-wrap:wrap; }
  .badge {
    font-size:11px; color:var(--muted); background:var(--panel); border:1px solid var(--line);
    border-radius:6px; padding:1px 6px;
  }
  .badge.skill { color:var(--accent); border-color:var(--accent-dim); }
  .badge.ov { color:var(--warn); border-color:var(--warn); }
  .card .actions { display:flex; gap:4px; align-items:center; opacity:0; transition:.12s; }
  .card:hover .actions { opacity:1; }
  select, input[type=text] {
    font:inherit; color:var(--txt); background:var(--panel); border:1px solid var(--line);
    border-radius:6px; padding:3px 6px; font-size:12px; max-width:150px;
  }
  .feed {
    flex:0 0 360px; border-left:1px solid var(--line); background:var(--panel);
    display:flex; flex-direction:column; min-height:0;
  }
  .feed-head { padding:9px 12px; border-bottom:1px solid var(--line); font-weight:600; display:flex; gap:8px; align-items:center; }
  .feed-head small { color:var(--faint); font-weight:400; }
  .log { flex:1; overflow:auto; padding:8px 12px; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
  .log .ln { padding:1px 0; color:var(--muted); white-space:pre-wrap; word-break:break-word; }
  .log .ln .k { color:var(--faint); margin-right:6px; }
  .log .ln.error { color:var(--bad); } .log .ln.tool .k { color:var(--accent); }
  .log .ln.agent .k { color:var(--warn); }
  .legend { padding:8px 12px; border-top:1px solid var(--line); color:var(--faint); font-size:11px; display:flex; gap:10px; flex-wrap:wrap; }
  .runpill { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .runpill .dot.running { background:var(--run); } .runpill .dot.paused { background:var(--warn); }
  .hint { color:var(--faint); font-size:12px; padding:0 4px; }
</style>
</head>
<body>
<header>
  <div class="brand">sym<b>vibe</b><small>Baukasten</small></div>
  <div class="runpill"><span class="dot" id="runDot"></span><span id="runLabel">idle</span></div>
  <div class="spacer"></div>
  <div class="toolbar" id="toolbar">
    <button class="primary" id="btnRun">▶ Run Cycle</button>
    <button id="btnPause" disabled>❚❚ Pause</button>
    <button id="btnResume" disabled>▶ Resume</button>
    <button id="btnCancel" disabled>✕ Cancel</button>
    <button class="ghost" id="btnAddPhase">+ Phase</button>
  </div>
  <div class="doctor" id="doctor"><span class="dot"></span><span>checking…</span></div>
</header>
<main>
  <div class="board" id="board"></div>
  <aside class="feed">
    <div class="feed-head">Activity <small id="feedStep"></small></div>
    <div class="log" id="log"></div>
    <div class="legend">
      <span>○ pending</span><span>◐ running</span><span>✓ done</span>
      <span>– skipped</span><span>✕ failed</span><span>⦸ blocked</span><span>! review</span>
    </div>
  </aside>
</main>

<script>
const GLYPH = { pending:"○", in_progress:"◐", done:"✓", skipped:"–", failed:"✕", blocked:"⦸", needs_review:"!" };
const $ = s => document.querySelector(s);
let cycle = null, models = null, skills = [], categories = {}, runnable = false, runState = {state:"idle"};

const api = {
  get: u => fetch(u).then(r => r.json()),
  send: (u, m, b) => fetch(u, {method:m, headers:{"content-type":"application/json"}, body: b!=null?JSON.stringify(b):undefined})
                       .then(async r => ({ok:r.ok, status:r.status, data: await r.json().catch(()=>({}))})),
};

async function boot() {
  [cycle, models, skills, categories] = await Promise.all([
    api.get("/api/cycle"), api.get("/api/models"), api.get("/api/skills"), api.get("/api/categories"),
  ]);
  await refreshDoctor();
  renderBoard();
  connectSSE();
}

async function refreshDoctor() {
  const d = await api.get("/api/doctor");
  runnable = !!d.runnable;
  const el = $("#doctor");
  const v = d.opencode && d.opencode.version ? (" v"+d.opencode.version) : "";
  el.innerHTML = `<span class="dot ${runnable?'ok':'bad'}"></span><span>opencode ${runnable?('online'+v):'offline'} · git ${d.git?'✓':'✕'} · gh ${d.gh?'✓':'✕'}</span>`;
  syncToolbar();
}

/* ---------------- rendering ---------------- */
function catOptions(sel) {
  const names = Object.keys(categories.categories||{});
  return names.map(n => `<option value="${n}" ${n===sel?'selected':''}>${n}</option>`).join("");
}
function skillOptions(sel) {
  const opts = [`<option value="">(no skill)</option>`].concat(
    skills.map(s => `<option value="${s.name}" ${s.name===sel?'selected':''}>${s.name}</option>`));
  return opts.join("");
}

function renderBoard() {
  const board = $("#board");
  board.innerHTML = "";
  const editable = runState.state === "idle";
  (cycle.phases||[]).forEach(ph => {
    const phase = document.createElement("div");
    phase.className = "phase";
    phase.innerHTML = `<div class="phase-head">
        <span class="pno">${ph.order}</span>
        <span class="pname">${esc(ph.name)}</span>
        <span class="spacer" style="flex:1"></span>
        <button class="tiny ghost" data-add="${ph.id}" ${editable?'':'disabled'}>+ Step</button>
        <button class="tiny ghost" data-delphase="${ph.id}" ${editable?'':'disabled'}>✕</button>
      </div>`;
    const steps = document.createElement("div");
    steps.className = "steps"; steps.dataset.phase = ph.id;
    (ph.steps||[]).forEach(st => steps.appendChild(stepCard(ph, st, editable)));
    wireDrop(steps, ph.id);
    phase.appendChild(steps);
    board.appendChild(phase);
  });
}

function stepCard(ph, st, editable) {
  const status = (st.status || "pending");
  const c = document.createElement("div");
  c.className = "card " + (st.enabled? "" : "disabled ") + (runState.current_step===st.id && runState.state!=="idle" ? "active":"");
  c.draggable = editable;
  c.dataset.step = st.id;
  const ov = st.model_override ? `<span class="badge ov" title="per-step model override">⮞ ${esc(st.model_override.id||"override")}</span>` : "";
  c.innerHTML = `
    <div class="glyph ${status}" data-glyph>${GLYPH[status]||"○"}</div>
    <div class="meta">
      <div class="title"><span class="sid">${st.id}</span><span class="name">${esc(st.name)}</span></div>
      <div class="binds">
        ${st.skill?`<span class="badge skill">$${esc(st.skill)}</span>`:""}
        <span class="badge">▦ ${esc(st.category||categories.default_category||"")}</span>
        ${st.agent?`<span class="badge">@${esc(st.agent)}</span>`:""}
        ${ov}
      </div>
    </div>
    <div class="actions">
      ${editable ? `
        <select data-skill title="bound skill">${skillOptions(st.skill)}</select>
        <select data-cat title="model category">${catOptions(st.category||categories.default_category)}</select>
        <label class="hint"><input type="checkbox" data-enabled ${st.enabled?'checked':''}/> on</label>
        <button class="tiny ghost" data-del title="delete">✕</button>` : ""}
      <button class="tiny primary" data-run title="run only this step" ${runnable && runState.state==='idle'?'':'disabled'}>▶</button>
    </div>`;
  if (editable) {
    c.querySelector("[data-skill]").onchange = e => patchStep(st.id, s => s.skill = e.target.value);
    c.querySelector("[data-cat]").onchange   = e => patchStep(st.id, s => s.category = e.target.value);
    c.querySelector("[data-enabled]").onchange = e => patchStep(st.id, s => s.enabled = e.target.checked);
    c.querySelector("[data-del]").onclick = () => { if (confirm(`Delete step ${st.id}?`)) mutate(c0 => deleteStepLocal(c0, st.id)); };
    c.ondragstart = e => { e.dataTransfer.setData("text/plain", st.id); e.dataTransfer.effectAllowed="move"; };
  }
  c.querySelector("[data-run]").onclick = () => runStep(st.id);
  return c;
}

function wireDrop(lane, phaseId) {
  lane.ondragover = e => { e.preventDefault(); lane.classList.add("dragover"); };
  lane.ondragleave = () => lane.classList.remove("dragover");
  lane.ondrop = e => {
    e.preventDefault(); lane.classList.remove("dragover");
    const id = e.dataTransfer.getData("text/plain"); if (!id) return;
    const after = [...lane.querySelectorAll(".card")].find(card => e.clientY < card.getBoundingClientRect().top + card.offsetHeight/2);
    const toIndex = after ? [...lane.children].indexOf(after) : (lane.querySelectorAll(".card").length);
    mutate(c0 => moveStepLocal(c0, id, phaseId, toIndex));
  };
}

/* ---------------- local model edits -> PUT whole cycle ---------------- */
function patchStep(id, fn) { mutate(c0 => { const s = findStep(c0, id); if (s) fn(s); }); }
function findStep(c0, id){ for(const p of c0.phases) for(const s of p.steps) if(s.id===id) return s; return null; }
function deleteStepLocal(c0, id){ for(const p of c0.phases){ const i=p.steps.findIndex(s=>s.id===id); if(i>=0){p.steps.splice(i,1); return;} } }
function moveStepLocal(c0, id, toPhase, toIndex){
  let moved=null;
  for(const p of c0.phases){ const i=p.steps.findIndex(s=>s.id===id); if(i>=0){ moved=p.steps.splice(i,1)[0]; break; } }
  if(!moved) return;
  const dst = c0.phases.find(p=>p.id===toPhase); if(!dst) return;
  dst.steps.splice(Math.max(0,Math.min(toIndex,dst.steps.length)), 0, moved);
}
async function mutate(fn) {
  const draft = JSON.parse(JSON.stringify(cycle));
  fn(draft);
  const r = await api.send("/api/cycle", "PUT", draft);
  if (!r.ok) { toast("edit rejected: " + (r.data.error||r.status)); return; }
  cycle = r.data; renderBoard();
}

/* ---------------- run control ---------------- */
async function runStep(id){ const r = await api.send("/api/run/step","POST",{step_id:id}); if(!r.ok) toast(r.data.error||("HTTP "+r.status)); }
async function runCycle(){ const r = await api.send("/api/run","POST"); if(!r.ok) toast(r.data.error||("HTTP "+r.status)); }
async function control(action){ const r = await api.send("/api/run/control","POST",{action}); if(!r.ok && r.status!==202) toast(r.data.error||("HTTP "+r.status)); }

$("#btnRun").onclick = runCycle;
$("#btnPause").onclick = () => control("pause");
$("#btnResume").onclick = () => control("resume");
$("#btnCancel").onclick = () => control("cancel");
$("#btnAddPhase").onclick = async () => {
  const name = prompt("Phase name:", "New Phase"); if(name==null) return;
  const r = await api.send("/api/cycle/phase","POST",{name}); if(r.ok){ cycle = await api.get("/api/cycle"); renderBoard(); }
};
document.addEventListener("click", async e => {
  const add = e.target.closest("[data-add]"); const del = e.target.closest("[data-delphase]");
  if (add) { const name = prompt("Step name:", "New step"); if(name==null) return;
    const skill = prompt("Bound skill (blank = none):","") || "";
    const r = await api.send("/api/cycle/step","POST",{phase_id:add.dataset.add, step:{name, skill, category:categories.default_category, enabled:true}});
    if(r.ok){ cycle = await api.get("/api/cycle"); renderBoard(); } else toast(r.data.error); }
  if (del) { if(confirm("Delete phase and its steps?")){ const r = await api.send("/api/cycle/phase/"+del.dataset.delphase,"DELETE");
    if(r.ok){ cycle = await api.get("/api/cycle"); renderBoard(); } else toast(r.data.error); } }
});

function syncToolbar(){
  const s = runState.state;
  $("#btnRun").disabled = !runnable || s!=="idle";
  $("#btnPause").disabled = s!=="running";
  $("#btnResume").disabled = !(s==="paused");
  $("#btnCancel").disabled = (s==="idle");
  const dot = $("#runDot"); dot.className = "dot " + (s==="idle"?"":s);
  $("#runLabel").textContent = s + (runState.current_step?(" · "+runState.current_step):"");
}

/* ---------------- live SSE ---------------- */
function connectSSE(){
  const es = new EventSource("/events");
  es.addEventListener("run_state", e => {
    const d = JSON.parse(e.data); runState = {state:d.state, run_id:d.run_id, current_step:d.step_id};
    syncToolbar(); renderBoard();
  });
  es.addEventListener("step_status", e => {
    const d = JSON.parse(e.data); applyStatus(d.step_id, d.status);
  });
  es.addEventListener("log", e => { const d = JSON.parse(e.data); appendLog(d); });
  es.addEventListener("board", async () => { cycle = await api.get("/api/cycle"); renderBoard(); });
  es.addEventListener("error", e => { try{ const d=JSON.parse(e.data); appendLog({kind:"error", line:d.line}); }catch(_){} });
  es.onerror = () => { /* browser auto-reconnects */ };
}
function applyStatus(stepId, status){
  const s = findStep(cycle, stepId); if (s) s.status = status;
  const card = document.querySelector(`.card[data-step="${cssEsc(stepId)}"]`);
  if (card){ const g = card.querySelector("[data-glyph]"); if(g){ g.textContent = GLYPH[status]||"○"; g.className = "glyph "+status; } }
}
let curFeedStep = "";
function appendLog(d){
  if (d.step_id && d.step_id!==curFeedStep){ curFeedStep = d.step_id; $("#feedStep").textContent = "· "+d.step_id; }
  const log = $("#log");
  const ln = document.createElement("div");
  ln.className = "ln " + (d.kind||"log");
  ln.innerHTML = `<span class="k">${esc(d.kind||"")}</span>${esc(d.line||"")}`;
  log.appendChild(ln);
  while (log.childElementCount > 400) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

/* ---------------- utils ---------------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function cssEsc(s){ return String(s).replace(/["\\]/g,"\\$&"); }
function toast(msg){ appendLog({kind:"error", line: msg}); }

boot().catch(e => { document.body.innerHTML = `<pre style="padding:20px;color:#e0726b">Failed to load symvibe board:\n${esc(e&&e.message||e)}</pre>`; });
</script>
</body>
</html>
