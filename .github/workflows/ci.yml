name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l ./cmd ./internal ./web/embed.go)"
          if [ -n "$unformatted" ]; then echo "needs gofmt:"; echo "$unformatted"; exit 1; fi

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: race
        run: CGO_ENABLED=1 go test -race ./internal/...

      - name: build
        run: go build -ldflags "-X github.com/danieljustus/symaira-vibecoder/internal/version.Version=${GITHUB_SHA::12}" -o symvibe ./cmd/symvibe

      - name: smoke
        run: ./symvibe version
